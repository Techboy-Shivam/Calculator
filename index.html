<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="TECHBOY CALC — A premium, unique calculator experience." />
  <meta name="theme-color" content="#080810" />
  <title>TECHBOY CALC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Custom cursor (desktop only) -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Ambient background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="app-wrapper">
    <div class="calc-container" id="calcContainer">

      <!-- Header brand -->
      <div class="calc-brand">
        <span class="brand-dot"></span>
        <span class="brand-text">TECHBOY CALC</span>
        <span class="brand-status" id="brandStatus">READY</span>
      </div>

      <!-- Display panel -->
      <div class="display-panel" id="displayPanel">
        <div class="display-expression" id="expressionDisplay" aria-label="Expression"></div>
        <div class="display-value" id="valueDisplay" aria-label="Result" aria-live="polite">0</div>
        <div class="display-error" id="errorDisplay" aria-live="assertive"></div>
        <div class="display-glow" aria-hidden="true"></div>
      </div>

      <!-- Button grid -->
      <div class="btn-grid" role="group" aria-label="Calculator buttons">

        <!-- Row 1: AC, Backspace, %, ÷ -->
        <button class="btn btn-clear" data-action="clear" aria-label="All Clear">
          <span class="btn-label">AC</span>
          <span class="btn-ripple"></span>
        </button>

        <button class="btn btn-back" data-action="backspace" aria-label="Backspace">
          <span class="btn-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </span>
          <span class="btn-ripple"></span>
        </button>

        <button class="btn btn-special" data-action="percent" aria-label="Percent">
          <span class="btn-label">%</span>
          <span class="btn-ripple"></span>
        </button>

        <button class="btn btn-op" data-action="operator" data-value="÷" aria-label="Divide">
          <span class="btn-label">÷</span>
          <span class="btn-ripple"></span>
        </button>

        <!-- Row 2: 7, 8, 9, × -->
        <button class="btn btn-num" data-action="number" data-value="7" aria-label="7">
          <span class="btn-label">7</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="8" aria-label="8">
          <span class="btn-label">8</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="9" aria-label="9">
          <span class="btn-label">9</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-op" data-action="operator" data-value="×" aria-label="Multiply">
          <span class="btn-label">×</span>
          <span class="btn-ripple"></span>
        </button>

        <!-- Row 3: 4, 5, 6, - -->
        <button class="btn btn-num" data-action="number" data-value="4" aria-label="4">
          <span class="btn-label">4</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="5" aria-label="5">
          <span class="btn-label">5</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="6" aria-label="6">
          <span class="btn-label">6</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-op" data-action="operator" data-value="-" aria-label="Subtract">
          <span class="btn-label">−</span>
          <span class="btn-ripple"></span>
        </button>

        <!-- Row 4: 1, 2, 3, + -->
        <button class="btn btn-num" data-action="number" data-value="1" aria-label="1">
          <span class="btn-label">1</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="2" aria-label="2">
          <span class="btn-label">2</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="3" aria-label="3">
          <span class="btn-label">3</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-op" data-action="operator" data-value="+" aria-label="Add">
          <span class="btn-label">+</span>
          <span class="btn-ripple"></span>
        </button>

        <!-- Row 5: +/-, 0, ., = -->
        <button class="btn btn-special" data-action="toggle-sign" aria-label="Toggle sign">
          <span class="btn-label">+/−</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-num" data-action="number" data-value="0" aria-label="0">
          <span class="btn-label">0</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-decimal" data-action="decimal" aria-label="Decimal point">
          <span class="btn-label">.</span>
          <span class="btn-ripple"></span>
        </button>
        <button class="btn btn-equals" data-action="equals" aria-label="Equals">
          <span class="btn-label">=</span>
          <span class="btn-ripple"></span>
          <span class="equals-burst" aria-hidden="true"></span>
        </button>

      </div>
      <!-- /btn-grid -->

    </div>
    <!-- /calc-container -->
  </main>

  <script src="script.js"></script>
</body>
</html>
